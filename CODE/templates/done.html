<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>All Done</title>
  <style>
    body {
      margin:0;
      background:#fff;
      color:#111;
      font-family: Arial, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
  </style>
</head>
<body>
  <h2>All done. <br>Your data has been saved.</h2>

  <script>
    const notificationUrl = {{ notification_url|tojson }};
    let notificationAudio = null;

    function stopNotification() {
      if (!notificationAudio) return;
      notificationAudio.pause();
      notificationAudio.currentTime = 0;
      notificationAudio.loop = false;
      notificationAudio.src = "";
      notificationAudio.load();
      notificationAudio = null;
    }

    if (notificationUrl) {
      notificationAudio = new Audio(notificationUrl);
      notificationAudio.loop = true;
      notificationAudio.play().catch((err) => {
        console.warn("Done-stage notification audio could not autoplay:", err);
      });
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        stopNotification();
      }
    });
  </script>
</body>
</html>
