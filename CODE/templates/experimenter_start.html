<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Experimenter Start</title>
  <style>
    body {
      background:#111;
      color:#eee;
      font-family: Arial, sans-serif;
      display:flex;
      height:100vh;
      align-items:center;
      justify-content:center;
    }
    .card {
      width: 420px;
      background:#1b1b1b;
      padding:24px;
      border-radius:12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    h2 { margin-top:0; }

    label {
      display:block;
      margin:14px 0 6px;
      font-size:15px;
    }

    input[type="number"] {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid #444;
      background:#0f0f0f;
      color:#eee;
      font-size:16px;
      box-sizing:border-box;
    }

    button {
      margin-top:22px;
      width:100%;
      padding:12px;
      border-radius:8px;
      border:0;
      font-size:16px;
      cursor:pointer;
      background:#eee;
      color:#111;
    }

    .err {
      margin-top:10px;
      color:#ff6b6b;
    }

    .hint {
      margin-top:10px;
      color:#aaa;
      font-size:13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Experimenter setup</h2>

    <form method="POST" action="/">
      <label for="participant_number">Participant number</label>
      <input
        id="participant_number"
        name="participant_number"
        type="number"
        min="1"
        step="1"
        required
        autofocus
      />

      <button type="submit">Continue to participant page</button>

      {% if error %}
        <div class="err">{{ error }}</div>
      {% endif %}
      <div class="hint">Enter this before handing the screen to the participant.</div>
    </form>
  </div>
</body>
</html>
